<main class="chat-shell" aria-label="Keppt Chat">
  <header class="chat-header">
    <button class="icon-button" type="button" aria-label="Menü öffnen">
      <span aria-hidden="true"></span>
    </button>
    <div class="chat-title">
      <p>Keppt</p>
      <span>{{ today }}</span>
    </div>
    <button class="icon-button more" type="button" aria-label="Weitere Optionen">
      <span aria-hidden="true"></span>
    </button>
  </header>

  <section class="conversation" aria-label="Unterhaltung">
    <div class="message-stack">
      @for (message of store.messages(); track message.id) {
        <keppt-chat-message [message]="message" />
      }
    </div>
  </section>

  <footer class="composer" aria-label="Nachricht verfassen">
    <div class="quick-actions" aria-label="Schnellantworten">
      @for (reply of store.quickReplies(); track reply.id) {
        <button type="button" (click)="submitQuickAction(reply.label)">
          {{ reply.label }}
        </button>
      }
    </div>

    <div class="composer-row">
      <button
        class="voice-button"
        type="button"
        aria-label="Spracheingabe starten"
        (click)="startVoiceCapture()"
      >
        <span aria-hidden="true"></span>
      </button>
      <label class="draft-field">
        <span class="visually-hidden">Nachricht</span>
        <textarea
          [value]="store.draft()"
          rows="1"
          placeholder="Nachricht an Keppt"
          (input)="updateDraft($event)"
          (keydown.enter)="$event.preventDefault(); submitDraft()"
        ></textarea>
      </label>
      <button
        class="send-button"
        type="button"
        aria-label="Nachricht senden"
        [disabled]="!store.canSubmit()"
        (click)="submitDraft()"
      >
        <span aria-hidden="true"></span>
      </button>
    </div>
  </footer>
</main>
